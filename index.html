<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline';" />
  <title>Primal Online</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #c9a84c;
      --gold-dim:    #7a6028;
      --red:         #c0392b;
      --red-bright:  #e74c3c;
      --blue-glow:   #aee3f1;
      --dark:        #050310;
      --panel:       rgba(5, 3, 16, 0.82);
      --border:      rgba(201, 168, 76, 0.35);
      --text-main:   #e8dcc8;
      --text-dim:    #8a7a60;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text-main);
      user-select: none;
      -webkit-app-region: no-drag; /* children opt in */
    }

    /* ── Background ──────────────────────────────────────────────── */
    #bg {
      position: fixed; inset: 0;
      background-image: url('../assets/bg.png');
      background-size: cover;
      background-position: center top;
    }
    /* Atmospheric vignette */
    #bg::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(5,3,16,0.92) 0%, transparent 70%),
        radial-gradient(ellipse 100% 40% at 50% 0%,   rgba(5,3,16,0.4) 0%, transparent 80%);
    }

    /* ── Drag region — top bar ────────────────────────────────────── */
    #titlebar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 36px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px;
      -webkit-app-region: drag;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(5,3,16,0.7), transparent);
    }
    #titlebar .title {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      -webkit-app-region: drag;
    }
    #window-controls {
      display: flex; gap: 8px;
      -webkit-app-region: no-drag;
    }
    #window-controls button {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: bold; color: transparent;
      transition: color 0.15s;
    }
    #window-controls button:hover { color: rgba(0,0,0,0.7); }
    #btn-close    { background: #c0392b; }
    #btn-minimize { background: #c9a84c; }

    /* ── Main layout ─────────────────────────────────────────────── */
    #ui {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 36px;
      z-index: 10;
    }

    /* ── Bottom panel ────────────────────────────────────────────── */
    #bottom-panel {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }

    /* ── Status line ─────────────────────────────────────────────── */
    #status-line {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      min-height: 42px;
    }
    #status-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--blue-glow);
      text-transform: uppercase;
      opacity: 0.85;
      transition: opacity 0.3s;
    }
    #status-text.hidden { opacity: 0; }

    /* ── Progress bar ────────────────────────────────────────────── */
    #progress-wrap {
      width: 400px; height: 3px;
      background: rgba(201,168,76,0.12);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #progress-wrap.visible { opacity: 1; }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 2px;
      transition: width 0.2s ease-out;
      position: relative;
    }
    /* shimmer on indeterminate */
    #progress-bar.indeterminate {
      width: 40% !important;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { margin-left: -40%; }
      100% { margin-left: 100%; }
    }

    /* ── AI badge (shown when PHOBOS is active) ──────────────────── */
    #ai-badge {
      display: flex; align-items: center; gap: 7px;
      padding: 4px 14px;
      border: 1px solid rgba(174, 227, 241, 0.2);
      border-radius: 2px;
      background: rgba(5, 3, 16, 0.6);
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--blue-glow);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.4s, transform 0.4s;
    }
    #ai-badge.visible {
      opacity: 0.75;
      transform: translateY(0);
    }
    #ai-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--blue-glow);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Play button ─────────────────────────────────────────────── */
    #play-wrap {
      position: relative;
    }
    /* Corner ornaments */
    #play-wrap::before,
    #play-wrap::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.6;
    }
    #play-wrap::before {
      top: -1px; left: -1px;
      border-width: 1px 0 0 1px;
    }
    #play-wrap::after {
      bottom: -1px; right: -1px;
      border-width: 0 1px 1px 0;
    }

    #play-btn {
      min-width: 220px;
      height: 56px;
      padding: 0 44px;
      background: rgba(5, 3, 16, 0.88);
      border: 1px solid var(--border);
      color: var(--blue-glow);
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    #play-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    #play-btn:hover:not(:disabled) {
      background: rgba(12, 8, 35, 0.9);
      border-color: rgba(201, 168, 76, 0.65);
      color: var(--gold);
      box-shadow: 0 0 24px rgba(201,168,76,0.18), inset 0 0 20px rgba(201,168,76,0.04);
    }
    #play-btn:active:not(:disabled) {
      transform: scale(0.99);
    }
    #play-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }
    #play-btn.error {
      border-color: rgba(192, 57, 43, 0.65);
      color: var(--red-bright);
    }
    #play-btn.error:hover:not(:disabled) {
      border-color: var(--red-bright);
      color: var(--red-bright);
      box-shadow: 0 0 24px rgba(231,76,60,0.2);
    }

    /* ── Version ─────────────────────────────────────────────────── */
    #version-text {
      position: fixed;
      bottom: 10px; right: 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div id="titlebar">
    <span class="title">PRIMAL ONLINE</span>
    <div id="window-controls">
      <button id="btn-minimize" title="Minimize">–</button>
      <button id="btn-close"    title="Close">✕</button>
    </div>
  </div>

  <div id="ui">
    <div id="bottom-panel">

      <div id="ai-badge">
        <div id="ai-dot"></div>
        <span id="ai-model-name">AI ACTIVE</span>
      </div>

      <div id="status-line">
        <div id="status-text">Initialising…</div>
        <div id="progress-wrap">
          <div id="progress-bar indeterminate"></div>
        </div>
      </div>

      <div id="play-wrap">
        <button id="play-btn" disabled>CHECKING</button>
      </div>

    </div>
  </div>

  <div id="version-text"></div>

  <script>
    // ── DOM refs ────────────────────────────────────────────────────
    const playBtn      = document.getElementById('play-btn');
    const statusText   = document.getElementById('status-text');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar  = document.getElementById('progress-bar');
    const aiBadge      = document.getElementById('ai-badge');
    const aiModelName  = document.getElementById('ai-model-name');
    const versionText  = document.getElementById('version-text');
    const btnClose     = document.getElementById('btn-close');
    const btnMin       = document.getElementById('btn-minimize');

    // ── Window controls ─────────────────────────────────────────────
    btnClose.addEventListener('click', () => window.launcher.close());
    btnMin.addEventListener('click',   () => window.launcher.minimize());

    // ── State machine ───────────────────────────────────────────────
    let launcherState = 'loading'; // 'loading' | 'ready' | 'error'

    function setPhase(phase, message, progress) {
      statusText.textContent = message || '';

      switch (phase) {
        case 'check':
        case 'check-ai':
          setProgress('indeterminate');
          setButton('disabled', message || 'CHECKING');
          break;

        case 'download-game':
        case 'download-phobos':
          setProgress(progress ?? 'indeterminate');
          setButton('disabled', phase === 'download-game' ? 'DOWNLOADING' : 'LOADING AI');
          break;

        case 'starting-ai':
          setProgress('indeterminate');
          setButton('disabled', 'LOADING AI');
          break;

        case 'ready':
          setProgress('hide');
          statusText.textContent = '';
          setButton('ready', 'PLAY');
          launcherState = 'ready';
          break;

        case 'error':
          setProgress('hide');
          setButton('error', 'RETRY');
          launcherState = 'error';
          break;
      }
    }

    function setProgress(state) {
      if (state === 'hide') {
        progressWrap.classList.remove('visible');
        return;
      }
      progressWrap.classList.add('visible');
      if (state === 'indeterminate') {
        progressBar.classList.add('indeterminate');
        progressBar.style.width = '';
      } else {
        progressBar.classList.remove('indeterminate');
        progressBar.style.width = state + '%';
      }
    }

    function setButton(state, label) {
      playBtn.textContent = label;
      playBtn.disabled    = state === 'disabled';
      playBtn.classList.toggle('error', state === 'error');
    }

    // ── Main process callbacks ───────────────────────────────────────
    window.launcher.onStatus(({ phase, message, progress }) => {
      setPhase(phase, message, progress);
    });

    window.launcher.onAIReady(({ model }) => {
      if (model) {
        aiModelName.textContent = 'AI · ' + model.toUpperCase().replace(/-/g, ' ');
        aiBadge.classList.add('visible');
      }
    });

    // ── Play button ─────────────────────────────────────────────────
    playBtn.addEventListener('click', () => {
      if (launcherState === 'ready') {
        window.launcher.launch();
        setButton('disabled', 'LAUNCHING…');
      } else if (launcherState === 'error') {
        launcherState = 'loading';
        setPhase('check', 'Retrying…');
        window.launcher.start();
      }
    });

    // ── Boot ────────────────────────────────────────────────────────
    window.launcher.start();
  </script>
</body>
</html>
